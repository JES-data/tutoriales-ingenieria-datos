<style>
  :root {
    --nav-width: 260px; /* Ancho fijo del menú */
    --content-max-width: 1100px; /* Ancho máximo de tu contenido */
  }

  /* --- Ajustes de Escritorio --- */
  @media screen and (min-width: 768px) {
    /* 1. Mover y ajustar el menú lateral */
    .side-bar {
      width: var(--nav-width);
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      overflow-y: auto;
    }

    /* 2. Empujar el contenido principal para que empiece después del menú */
    .main-content-wrap {
      margin-left: var(--nav-width);
      max-width: var(--content-max-width);
      padding: 0 40px; /* Espacio cómodo a los lados */
    }

    /* 3. Asegurar que el header también respete el margen del menú */
    .main-header {
      margin-left: var(--nav-width);
      padding: 0 40px;
    }
  }

  /* --- Ajustes de Celulares --- */
  @media screen and (max-width: 767px) {
    .side-bar {
      width: 100%;
      position: relative; /* En celular el menú es parte del flujo normal */
    }
    .main-content-wrap {
      margin-left: 0;
      padding: 15px;
    }
  }
</style>
