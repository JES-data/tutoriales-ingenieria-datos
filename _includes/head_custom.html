<style>
  :root {
    /* Ajusta el ancho de la barra lateral (por defecto suele ser 300px) */
    --nav-width: 240px; 
    
    /* Ajusta el ancho del contenedor de texto central */
    --content-width: 1000px;
  }

  @media screen and (min-width: 768px) {
    /* Ajuste del ancho del sidebar */
    .side-bar {
      width: var(--nav-width);
    }

    /* Ajuste para mover el contenido central cuando el sidebar es más chico */
    .main-content-wrap {
      margin-left: var(--nav-width);
      max-width: var(--content-width);
      /* Esto elimina el centrado rígido y lo alinea a la izquierda */
      margin-right: auto;
      padding-left: 40px;
      padding-right: 40px;
    }

    /* Ajuste para el encabezado */
    .main-header {
      margin-left: var(--nav-width);
      max-width: var(--content-width);
    }
  }
</style>
